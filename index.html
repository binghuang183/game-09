<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>幸运拉杆抽奖机</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background: #f9f9f9;
            padding: 15px;
            max-width: 400px;
            margin: 0 auto;
            padding-bottom: 50px;
        }
        .login-box {
            margin: 40px 0;
            text-align: center;
        }
        input {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            margin-bottom: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        button {
            padding: 12px 20px;
            background: #ff4444;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin: 4px;
        }
        button.gray {
            background: #888;
        }
        button:disabled {
            background: #ccc;
        }

        .machine-box {
            display: none;
            margin: 20px 0;
        }
        .info {
            font-size: 17px;
            text-align: center;
            margin-bottom: 15px;
        }

        /* 奖品表格 */
        .prize-table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
            margin-bottom: 20px;
            border-radius: 8px;
            overflow: hidden;
        }
        .prize-table td {
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid #eee;
        }
        .prize-table tr:last-child td {
            border-bottom: none;
        }
        .prize-red {
            color: #e53935;
            font-weight: bold;
        }
        .prize-orange {
            color: #ff9800;
            font-weight: bold;
        }
        .prize-blue {
            color: #1976d2;
        }
        .prize-gray {
            color: #757575;
        }

        .screen {
            width: 100%;
            height: 100px;
            background: #fff;
            border: 4px solid #222;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: #c62828;
            margin-bottom: 20px;
            transition: all 0.3s;
        }
        /* 大奖高亮动画 */
        .screen.big-prize {
            color: #ff3d00;
            background: #fff3e0;
            border-color: #ff5722;
            animation: prizeFlash 1s ease-in-out infinite alternate;
        }
        @keyframes prizeFlash {
            from { transform: scale(1); }
            to { transform: scale(1.08); }
        }

        .handle {
            width: 32px;
            height: 85px;
            background: #ffc107;
            border-radius: 4px;
            margin: 0 auto;
            cursor: pointer;
            transition: transform 0.2s;
            border: 2px solid #222;
        }
        .handle:active {
            transform: translateY(22px);
        }
        .result {
            font-size: 22px;
            color: #ff4444;
            font-weight: bold;
            text-align: center;
            margin: 15px 0;
        }

        .record-box {
            margin: 25px 0;
        }
        .record-box h3 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 16px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
            font-size: 14px;
        }
        th, td {
            border: 1px solid #ccc;
            padding: 8px 6px;
            text-align: center;
        }
        th {
            background: #f5f5f5;
        }

        /* 管理员面板（隐藏） */
        .admin-box {
            display: none;
            background: #fff;
            border-radius: 10px;
            padding: 15px;
            margin: 20px 0;
            border: 1px solid #ddd;
        }
        .admin-box h3 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 16px;
        }
        .admin-table {
            font-size: 13px;
        }
        .admin-table td {
            padding: 6px 4px;
        }
    </style>
</head>
<body>

<div class="login-box" id="loginBox">
    <h2>请输入抽奖密码</h2>
    <br>
    <input type="text" id="pwdInput" placeholder="请输入抽奖密码">
    <button onclick="checkPwd()">验证密码</button>
</div>

<div class="machine-box" id="machineBox">
    <div class="info">剩余次数：<span id="remainCount">0</span> 次</div>

    <table class="prize-table">
        <tr><td class="prize-red">特等奖</td></tr>
        <tr><td class="prize-orange">精美礼品</td></tr>
        <tr><td class="prize-orange">100元代金券</td></tr>
        <tr><td class="prize-blue">50元代金券</td></tr>
        <tr><td class="prize-blue">20元代金券</td></tr>
        <tr><td class="prize-blue">10元代金券</td></tr>
        <tr><td class="prize-blue">5元代金券</td></tr>
        <tr><td class="prize-gray">谢谢参与</td></tr>
    </table>

    <div class="screen" id="screen">准备抽奖</div>
    <div class="handle" onclick="pullHandle()"></div>
    <div class="result" id="result"></div>

    <div class="record-box">
        <h3>中奖记录</h3>
        <table>
            <thead>
                <tr>
                    <th>密码</th>
                    <th>奖品</th>
                    <th>时间</th>
                </tr>
            </thead>
            <tbody id="recordBody"></tbody>
        </table>
    </div>
</div>

<!-- 管理员面板（客户不可见） -->
<div class="admin-box" id="adminBox">
    <h3>密码使用情况</h3>
    <table class="admin-table" width="100%">
        <thead>
            <tr>
                <th>密码</th>
                <th>总次数</th>
                <th>剩余次数</th>
                <th>状态</th>
            </tr>
        </thead>
        <tbody id="adminBody"></tbody>
    </table>
    <br>
    <button class="gray" onclick="hideAdminPanel()">关闭</button>
</div>

<script>
    // ====================== 密码配置 ======================
    const pwdConfig = {
        "123456": 1,
        "888888": 3,
        "666666": 5,
        "vip999": 10
    };

    // ====================== 奖品概率 ======================
    const prizeList = [
        { name: "谢谢参与", weight: 50 },
        { name: "5元代金券", weight: 10 },
        { name: "10元代金券", weight: 8 },
        { name: "20元代金券", weight: 5 },
        { name: "50元代金券", weight: 3 },
        { name: "100元代金券", weight: 2 },
        { name: "精美礼品", weight: 1 },
        { name: "特等奖", weight: 1 }
    ];

    // 大奖（触发高亮动画）
    const bigPrizeList = ["特等奖", "精美礼品", "100元代金券"];
    const noRepeatPrize = ["特等奖", "精美礼品", "100元代金券"];

    let currentPwd = '';
    let rolling = false;

    // ===== 本地存储 =====
    function getUsed() {
        let d = localStorage.getItem('usedPwd');
        return d ? JSON.parse(d) : {};
    }
    function setUsed(pwd, num) {
        let d = getUsed();
        d[pwd] = num;
        localStorage.setItem('usedPwd', JSON.stringify(d));
    }

    function getRecords() {
        let r = localStorage.getItem('luckyRecords');
        return r ? JSON.parse(r) : [];
    }
    function saveRecord(pwd, prize) {
        let list = getRecords();
        let now = new Date();
        let time = now.getFullYear() + '-' +
                  String(now.getMonth()+1).padStart(2,0) + '-' +
                  String(now.getDate()).padStart(2,0) + ' ' +
                  String(now.getHours()).padStart(2,0) + ':' +
                  String(now.getMinutes()).padStart(2,0);
        list.unshift({ pwd, prize, time });
        localStorage.setItem('luckyRecords', JSON.stringify(list));
    }

    function renderRecords() {
        let list = getRecords();
        let html = '';
        list.forEach(item => {
            html += `<tr><td>${item.pwd}</td><td>${item.prize}</td><td>${item.time}</td></tr>`;
        });
        document.getElementById('recordBody').innerHTML = html;
    }

    // ===== 管理员面板（仅代码调用） =====
    function showAdminPanel() {
        document.getElementById('loginBox').style.display = 'none';
        document.getElementById('machineBox').style.display = 'none';
        let box = document.getElementById('adminBox');
        box.style.display = 'block';

        let used = getUsed();
        let html = '';
        for (let p in pwdConfig) {
            let total = pwdConfig[p];
            let left = used[p] ?? total;
            let status = left <= 0 ? "已用完" : "可使用";
            html += `
            <tr>
                <td>${p}</td>
                <td>${total}</td>
                <td>${left}</td>
                <td>${status}</td>
            </tr>`;
        }
        document.getElementById('adminBody').innerHTML = html;
    }
    function hideAdminPanel() {
        document.getElementById('adminBox').style.display = 'none';
        document.getElementById('loginBox').style.display = 'block';
    }

    // ===== 验证密码 =====
    function checkPwd() {
        let val = document.getElementById('pwdInput').value.trim();
        if (!val) { alert('请输入密码'); return; }
        if (!pwdConfig[val]) { alert('密码错误'); return; }

        currentPwd = val;
        let used = getUsed();

        if (used[val] === 0) {
            alert('该密码次数已用完，无法使用');
            return;
        }

        let remain = used[val] || pwdConfig[val];
        setUsed(val, remain);

        document.getElementById('loginBox').style.display = 'none';
        document.getElementById('adminBox').style.display = 'none';
        document.getElementById('machineBox').style.display = 'block';
        document.getElementById('remainCount').innerText = remain;
        renderRecords();
    }

    // ===== 抽奖（去重） =====
    function getPrize() {
        let records = getRecords();
        let userPrizes = records.filter(r => r.pwd === currentPwd).map(r => r.prize);

        let allowed = prizeList.filter(p => {
            if (noRepeatPrize.includes(p.name)) {
                return !userPrizes.includes(p.name);
            }
            return true;
        });

        let total = allowed.reduce((a,b)=>a+b.weight, 0);
        let r = Math.random() * total;
        let cur = 0;
        for (let p of allowed) {
            cur += p.weight;
            if (r < cur) return p.name;
        }
        return allowed[0].name;
    }

    // ===== 拉杆抽奖 =====
    function pullHandle() {
        if (rolling) {
            alert("正在抽奖中，请勿重复点击！");
            return;
        }

        let used = getUsed();
        let remain = used[currentPwd];
        if (remain <= 0) {
            alert('次数已用完，密码失效');
            return;
        }

        rolling = true;
        document.getElementById('result').innerText = '';
        document.getElementById('screen').classList.remove('big-prize');

        let count = 0;
        let timer = setInterval(() => {
            let rand = prizeList[Math.floor(Math.random() * prizeList.length)].name;
            document.getElementById('screen').innerText = rand;
            count++;
            if (count > 30) {
                clearInterval(timer);
                let res = getPrize();
                document.getElementById('screen').innerText = res;

                if (bigPrizeList.includes(res)) {
                    document.getElementById('screen').classList.add('big-prize');
                }

                saveRecord(currentPwd, res);
                renderRecords();

                remain--;
                setUsed(currentPwd, remain);
                document.getElementById('remainCount').innerText = remain;
                document.getElementById('result').innerText = '恭喜获得：' + res;

                rolling = false;

                if (remain === 0) {
                    setTimeout(()=>alert("次数已用完，该密码无法再次使用！"),500);
                }
            }
        }, 80);
    }
</script>
</body>
</html>
